<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis II — Tracker en direct</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  background: #020810;
  color: #cce8ff;
  font-family: 'Share Tech Mono', monospace;
  max-width: 480px;
  margin: auto;
  padding: 20px;
}
h1 { text-align: center; }

.card {
  background: #060f1e;
  border: 1px solid #0d2540;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
}

.value {
  font-size: 1.5rem;
  color: white;
}

.status {
  font-size: 0.9rem;
  color: #888;
  margin-top: 10px;
}
</style>

</head>

<body>

<h1>ARTEMIS II</h1>

<div class="card">
  <div>Distance Terre</div>
  <div class="value" id="earth">—</div>
</div>

<div class="card">
  <div>Distance Lune</div>
  <div class="value" id="moon">—</div>
</div>

<div class="card">
  <div>Vitesse</div>
  <div class="value" id="speed">—</div>
</div>

<div class="status" id="status">Connexion…</div>

<script>

// ⚠️ ─────────────────────────────────────────────
// 👉 MODIFIER CETTE URL AVEC TON BACKEND RENDER
// ex: https://mon-app.onrender.com/data
// ─────────────────────────────────────────────
const API_URL = "https://ton-app.onrender.com/data";

function fmtKm(km) {
  if (km == null) return "—";
  if (km >= 1e6) return (km/1e6).toFixed(3) + " M km";
  return km.toLocaleString('fr-FR') + " km";
}

function fmtSpeed(kmh) {
  return kmh.toLocaleString('fr-FR') + " km/h";
}

async function refresh() {
  try {
    const res = await fetch(API_URL);
    const d = await res.json();

    if (d.error) throw new Error(d.error);

    document.getElementById("earth").textContent = fmtKm(d.earth);
    document.getElementById("moon").textContent  = fmtKm(d.moon);
    document.getElementById("speed").textContent =
      fmtSpeed(d.speed_kmh) + " (" + d.speed_kms.toFixed(2) + " km/s)";

    document.getElementById("status").textContent =
      "OK — " + new Date().toLocaleTimeString();

  } catch (e) {
    document.getElementById("status").textContent =
      "Erreur : " + e.message;
  }
}

// rafraîchissement auto
setInterval(refresh, 5000);
refresh();

</script>

</body>
</html>
