<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis II — Tracker en direct</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* --- STYLE ORIGINAL STRICTEMENT CONSERVÉ --- */
:root {
  --bg:#020810;--surface:#060f1e;--border:#0d2540;
  --glow:#00aaff;--glow2:#0055cc;--amber:#ffaa00;
  --green:#00ff88;--red:#ff3355;--text:#cce8ff;--dim:#3a6080;
  --mono:'Share Tech Mono', monospace;--display:'Orbitron', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;}
.wrapper{max-width:480px;margin:0 auto;padding:24px 16px 40px;}
h1{font-family:var(--display);text-align:center;}

.card{background:var(--surface);border:1px solid var(--border);
padding:16px;margin-bottom:12px;border-radius:8px;}
.card-value{font-family:var(--display);font-size:1.6rem;color:#fff;}

.status{font-size:11px;color:var(--dim);margin-top:10px;} </style>

</head>

<body>

<div class="wrapper">

<h1>ARTEMIS II</h1>

<div class="card">
  <div>Distance à la Terre</div>
  <div class="card-value" id="val-earth">—</div>
</div>

<div class="card">
  <div>Distance à la Lune</div>
  <div class="card-value" id="val-moon">—</div>
</div>

<div class="card">
  <div>Vitesse (/ Terre)</div>
  <div class="card-value" id="val-speed">—</div>
</div>

<div class="card">
  <div>MET</div>
  <div class="card-value" id="met">—</div>
</div>

<div class="status" id="status-text">Connexion à l'API NASA/JPL…</div>

</div>

<script>

// ── CONFIG ─────────────────────────────────────────
const API_URL = "https://artemis2-tracker.onrender.com//data";

const REFRESH_MS = 5000;
const LAUNCH_UTC = new Date('2026-04-01T22:35:12Z');

// ── MET ────────────────────────────────────────────
function updateMET() {
  const now = new Date();
  const diffS = Math.floor((now - LAUNCH_UTC)/1000);
  if (diffS < 0) return;

  const j = Math.floor(diffS / 86400);
  const h = Math.floor((diffS % 86400)/3600).toString().padStart(2,'0');
  const m = Math.floor((diffS % 3600)/60).toString().padStart(2,'0');
  const s = (diffS % 60).toString().padStart(2,'0');

  document.getElementById('met').textContent =
    `${j}j ${h}h ${m}m ${s}s`;
}
setInterval(updateMET, 1000);
updateMET();

// ── FORMAT ─────────────────────────────────────────
function fmtKm(km){
  if(km==null) return "—";
  if(km>=1e6) return (km/1e6).toFixed(3)+" M km";
  return km.toLocaleString('fr-FR')+" km";
}
function fmtSpeed(kmh){
  return kmh.toLocaleString('fr-FR')+" km/h";
}

// ── REFRESH (MODIFIÉ UNIQUEMENT ICI) ───────────────
async function refresh(){
  try {
    const res = await fetch(API_URL);
    const d = await res.json();

    if (d.error) throw new Error(d.error);

    document.getElementById("val-earth").textContent = fmtKm(d.earth);
    document.getElementById("val-moon").textContent  = fmtKm(d.moon);
    document.getElementById("val-speed").textContent =
      fmtSpeed(d.speed_kmh) + " (" + d.speed_kms.toFixed(2) + " km/s)";

    document.getElementById("status-text").textContent =
      "Données JPL Horizons · en direct";

  } catch(e) {
    document.getElementById("status-text").textContent =
      "Erreur : " + e.message;
  }
}

setInterval(refresh, REFRESH_MS);
refresh();

</script>

</body>
</html>
